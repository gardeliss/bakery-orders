<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Νέα Παραγγελία - Ζαχαροπλαστείο</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="nav">
            <a href="admin.html" class="nav-link">🔍 Αναζήτηση Παραγγελιών</a>
        </div>
        <h2>🍰 Νέα Παραγγελία</h2>
        <form id="orderForm">
            <div class="row">
                <input type="text" id="firstName" placeholder="Όνομα" required>
                <input type="text" id="lastName" placeholder="Επώνυμο" required>
            </div>
            <div class="row">
                <input type="tel" id="phone" placeholder="Τηλέφωνο" required>
                <input type="email" id="email" placeholder="Email">
            </div>
            <textarea id="description" placeholder="Περιγραφή Παραγγελίας..." rows="4" required></textarea>
            <div class="row">
                <label>Ημ/νία Παράδοσης: <input type="date" id="deliveryDate" required></label>
                <select id="locationType">
                    <option value="Σπίτι">Σπίτι</option>
                    <option value="Παιδότοπος">Παιδότοπος</option>
                    <option value="Καφέ">Καφέ</option>
                </select>
            </div>
            <input type="text" id="address" placeholder="Διεύθυνση Παράδοσης">
            <div class="row">
                <input type="number" id="totalPrice" placeholder="Συνολική Τιμή (€)" step="0.01">
                <input type="number" id="deposit" placeholder="Προκαταβολή (€)" step="0.01">
            </div>
            <button type="button" id="submitBtn" onclick="saveOrder()">✅ Αποθήκευση Παραγγελίας</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
