<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Καταχώρηση - Ζαχαροπλαστείο Ζάχαρη</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container no-print">
        <div class="banner">
            <img src="banner.png" alt="Ζαχαροπλαστείο Ζάχαρη">
        </div>

        <div class="nav">
            <a href="admin.html" class="nav-link">🔍 Αναζήτηση</a>
            <a href="calendar.html" class="nav-link">📅 Ημερολόγιο & Εβδομάδα</a>
        </div>

        <h2 id="formTitle">🍰 Νέα Παραγγελία</h2>
        <form id="orderForm">
            <input type="hidden" id="orderId">
            
            <div class="row">
                <input type="text" id="firstName" placeholder="Όνομα" required>
                <input type="text" id="lastName" placeholder="Επώνυμο" required>
            </div>
            
            <div class="row">
                <input type="tel" id="phone" placeholder="Τηλέφωνο" required>
                <input type="email" id="email" placeholder="Email">
            </div>
            
            <textarea id="description" placeholder="Περιγραφή Παραγγελίας..." rows="5" required></textarea>
            
            <div class="row">
                <div class="input-group" style="flex:1">
                    <label style="display:block; margin-bottom:5px; font-weight:bold;">Ημερομηνία Παράδοσης</label>
                    <input type="date" id="deliveryDate" required>
                </div>
            </div>

            <div class="row">
                <div class="input-group" style="flex:1">
                    <label style="display:block; margin-bottom:5px; font-weight:bold;">Τοποθεσία Παράδοσης</label>
                    <select id="locationType">
                        <option value="Σπίτι">Σπίτι</option>
                        <option value="Παιδότοπος">Παιδότοπος</option>
                        <option value="Καφέ">Καφέ</option>
                    </select>
                </div>
            </div>

            <input type="text" id="address" placeholder="Διεύθυνση Παράδοσης (αν υπάρχει)">
            
            <div class="row">
                <div class="input-group" style="flex:1">
                    <label style="display:block; margin-bottom:5px; font-weight:bold;">Συνολική Τιμή (€)</label>
                    <input type="number" id="totalPrice" placeholder="0.00" step="0.01">
                </div>
                <div class="input-group" style="flex:1">
                    <label style="display:block; margin-bottom:5px; font-weight:bold;">Προκαταβολή (€)</label>
                    <input type="number" id="deposit" placeholder="0.00" step="0.01">
                </div>
            </div>
            
            <div class="form-actions">
                <button type="button" id="submitBtn" onclick="handleSave()">✅ Αποθήκευση Παραγγελίας</button>
                <button type="button" id="formPrintBtn" style="display:none;" onclick="printFromForm()">🖨️ Εκτύπωση Παραγγελίας</button>
            </div>
        </form>
    </div>

    <div id="printArea" class="print-only"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
    <script>
        window.onload = () => {
            const params = new URLSearchParams(window.location.search);
            const editId = params.get('edit');
            if (editId) {
                // Αν είμαστε σε mode επεξεργασίας, φορτώνουμε τα δεδομένα
                loadOrderToEdit(editId);
            }
        };
    </script>
</body>
</html>
